name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Windows application
        run: >-
          dotnet publish "My Fancy Fences/My Fancy Fences.csproj"
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish

      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path "publish/*" -DestinationPath "My-Fancy-Fences-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: My-Fancy-Fences-${{ github.ref_name }}-win-x64.zip
